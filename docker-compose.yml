services:
  backend:
      container_name: backend
      build:
        context: .
        dockerfile: Dockerfile
        target: final
      environment:
        - NODE_ENV=production
        - MONGO_URI=${MONGO_URI}
        - JWT_SECRET=${JWT_SECRET}
        - PORT=${PORT}
        - SMTP_HOST=${SMTP_HOST}
        - SMTP_PORT=${SMTP_PORT}
        - SMTP_SECURE=${SMTP_SECURE}
        - SMTP_USER=${SMTP_USER}
        - SMTP_PASS=${SMTP_PASS}
        - EMAIL_FROM=${EMAIL_FROM}
        - APP_URL=${APP_URL}
        - ENCRYPTION_KEY=${ENCRYPTION_KEY}
        # Old key, ONLY for scripts/rotateEncryption.js. Remove together with
        # the ENCRYPTION_KEY_OLD line in .env once the migration has run.
        - ENCRYPTION_KEY_OLD=${ENCRYPTION_KEY_OLD:-}
        # Key vault (envelope encryption). Zero-config: with none of these set,
        # ENCRYPTION_KEY is used as KEK "v1". To rotate, supply a versioned
        # keyring (KEK_KEYRING JSON or a mounted KEK_KEYRING_FILE) + active version.
        - KEK_KEYRING=${KEK_KEYRING:-}
        - KEK_ACTIVE_VERSION=${KEK_ACTIVE_VERSION:-}
        - KEK_KEYRING_FILE=${KEK_KEYRING_FILE:-}
        # Object storage (MinIO). Encrypted blobs live in the bucket; the local
        # uploads volume below is kept so pre-MinIO files remain readable
        # (the storage layer reads legacy local paths through to disk).
        - STORAGE_DRIVER=${STORAGE_DRIVER:-minio}
        - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio}
        - MINIO_PORT=${MINIO_PORT:-9000}
        - MINIO_USE_SSL=${MINIO_USE_SSL:-false}
        - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
        - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
        - MINIO_BUCKET=${MINIO_BUCKET:-securevault}
      ports:
      - "5000:5000"   # expose backend separately here
      networks:
        - app_network
      volumes:
        # Persist encrypted uploads across container restarts/rebuilds.
        # Must match where the backend actually writes files: code is copied to
        # /app/src, so multer's "../uploads" resolves to /app/src/uploads.
        # Without this volume the uploads live in the ephemeral container layer
        # and are wiped on every restart -> integrity check "File not found".
        - uploads_data:/app/src/uploads
      depends_on:
        minio:
          condition: service_healthy
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:5000/"]
        interval: 10s
        timeout: 5s
        retries: 3

  minio:
    container_name: minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    networks:
      - app_network
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    container_name: nginx
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    ports:
      - "8800:80"
    networks:
      - app_network
    volumes:
      - ./backend/uploads:/app/uploads
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

networks:
  app_network:
    driver: bridge

volumes:
  mongodb_data:
  uploads_data:
  minio_data: